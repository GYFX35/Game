<!DOCTYPE html>
<html>
  <head>
    <title>AR Box Game</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA primary meta tags -->
    <meta name="theme-color" content="#000000"/>
    <link rel="manifest" href="/manifest.json">

    <!-- A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <div style="position: absolute; top: 10px; left: 10px; z-index: 1000; display: flex; gap: 10px;">
        <button id="invite-friends-btn">Invite Friends</button>
    </div>
    <a-scene embedded arjs>
      <a-marker preset="hiro">
          <a-box id="target-box" position='0 0.5 0' material='color: yellow;'></a-box>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>

    <div id="fb-root"></div>
    <script>
      window.fbAsyncInit = function() {
        FB.init({
          // IMPORTANT: You must replace '_YOUR_APP_ID_' with your real Facebook App ID
          // for the "Invite Friends" feature to work.
          appId      : '_YOUR_APP_ID_',
          cookie     : true,
          xfbml      : true,
          version    : 'v19.0'
        });
        FB.AppEvents.logPageView();

        document.getElementById('invite-friends-btn').addEventListener('click', function() {
          FB.ui({
            method: 'apprequests',
            message: 'Come play this awesome AR game with me!'
          }, function(response){
            console.log(response);
          });
        });
      };

      (function(d, s, id){
         var js, fjs = d.getElementsByTagName(s)[0];
         if (d.getElementById(id)) {return;}
         js = d.createElement(s); js.id = id;
         // IMPORTANT: You must replace '_YOUR_APP_ID_' with your real Facebook App ID.
         js.src = "https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v19.0&appId=_YOUR_APP_ID_";
         fjs.parentNode.insertBefore(js, fjs);
       }(document, 'script', 'facebook-jssdk'));
    </script>


    <script>
    // Game logic
    const box = document.querySelector('#target-box');
    let score = 0;

    // Add a score display
    const scoreDisplay = document.createElement('div');
    scoreDisplay.style.position = 'absolute';
    scoreDisplay.style.top = '10px';
    scoreDisplay.style.right = '10px';
    scoreDisplay.style.zIndex = '1000';
    scoreDisplay.style.color = 'white';
    scoreDisplay.style.fontSize = '24px';
    scoreDisplay.style.fontFamily = 'monospace';
    scoreDisplay.textContent = `Score: ${score}`;
    document.body.appendChild(scoreDisplay);

    box.addEventListener('click', () => {
      // 1. Increase score
      score++;
      scoreDisplay.textContent = `Score: ${score}`;

      // 2. Move the box to a new random position
      const x = (Math.random() - 0.5) * 2;
      const z = (Math.random() - 0.5) * 2;
      box.setAttribute('position', { x: x, y: 0.5, z: z });
    });
    </script>
  </body>
</html>
